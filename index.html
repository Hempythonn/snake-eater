<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Eater</title>
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <h1>SNAKE EATER</h1>
    <p>Collect the albums · Let's Rock!</p>
    <button onclick="startGame()">INICIAR</button>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="side-panel">

            <div class="score-box">
                <div class="score-label">Pontuação</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>

            <div class="now-playing">
                <div class="now-playing-label">▶ Tocando agora</div>
                <div id="idleText">no setlist...starving</div>
                <div class="album-display" id="albumDisplay">
                    <img class="album-cover-display" id="albumCoverDisplay" src="" alt="">
                    <div class="album-song" id="albumSongDisplay"></div>
                    <div class="album-band" id="albumBandDisplay"></div>
                </div>
            </div>

            <div class="controls-box">
                <div class="controls-label">Controles</div>
                <div class="key-hint"><span class="key">↑ ↓ ← →</span> mover</div>
                <div class="key-hint"><span class="key">P</span> pausar</div>
                <div class="key-hint"><span class="key">R</span> reiniciar</div>
            </div>

        </div>

    </div>

</body>

</html>
